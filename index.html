<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAJLEPSZE DUO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        /* === TWOJE STYLE (ZACHOWANE W 100%) === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html { scroll-behavior: smooth; }
        body { text-align: center; min-height: 100vh; padding: 20px; transition: all 0.5s ease-in-out; }

        .theme-toggle-button {
            display: inline-block; width: fit-content; margin: 0 5px; padding: 10px 20px;
            text-decoration: none; font-size: 1em; font-weight: 600; border: none;
            cursor: pointer; transition: all 0.3s ease; border-radius: 8px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: #FFFFFF;
        }
        
        .theme-toggle-container { margin: 25px auto; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        header, main, footer { margin: 20px auto; max-width: 900px; position: relative; z-index: 2; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery-item img { width: 100%; height: auto; border-radius: 5px; transition: transform 0.3s ease; cursor: pointer; }

        /* STYLE NOTATEK */
        .note-input-container { display: flex; gap: 10px; margin-bottom: 20px; }
        #note-text { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; }
        .note-card { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: left; border-left: 5px solid #A044FF; position: relative; }
        .delete-note { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ff4d4d; cursor: pointer; font-weight: bold; }

        /* MOTYW 1: GLASSMORPHISM */
        body:not(.neon-theme):not(.dark-theme) { color: #E0E0E0; background-color: #080815; background-image: url('moje_tlo_miasto.jpg'); background-size: cover; background-attachment: fixed; }
        body:not(.neon-theme):not(.dark-theme)::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(12, 12, 24, 0.9) 0%, rgba(18, 18, 40, 0.7) 100%); z-index: -1; }
        body:not(.neon-theme):not(.dark-theme) .content-box { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 30px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }

        /* MOTYW 2: NEON */
        .neon-theme { color: #CC33FF; background-color: #000000; background-image: url('moje_tlo_miasto.jpg'); background-size: cover; background-attachment: fixed; }
        .neon-theme::after { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: -1; }
        .neon-theme h1, .neon-theme h2 { text-shadow: 0 0 5px #E66FFF, 0 0 15px #E66FFF, 0 0 40px rgba(230, 111, 255, 0.9); color: #FFFFFF; }
        .neon-theme .content-box { background-color: rgba(0, 0, 15, 0.10); border: 2px solid #CC33FF; padding: 30px; border-radius: 10px; animation: neon-pulse 1.5s infinite alternate; }
        @keyframes neon-pulse { from { box-shadow: 0 0 10px #CC33FF; } to { box-shadow: 0 0 25px #CC33FF; } }

        /* MOTYW 3: DARK/FUTURISM */
        .dark-theme { background-color: #121212; color: #E0E0E0; }
        .dark-theme::before { content: ''; position: fixed; top: 50%; left: 50%; width: 80vh; height: 80vh; border-radius: 50%; background: radial-gradient(circle, rgba(255, 0, 255, 0.1) 0%, rgba(0, 255, 255, 0.1) 50%, rgba(18, 18, 18, 0) 70%); transform: translate(-50%, -50%); z-index: -2; }
        .dark-theme .content-box { background: transparent; padding: 30px; position: relative; overflow: hidden; }
        .dark-theme #galeria::before { content: ''; position: absolute; top: 50%; left: 50%; width: 500px; height: 300px; background: linear-gradient(135deg, #00FFFF, #FF00FF); clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%); transform: translate(-50%, -50%) rotate(5deg); opacity: 0.4; z-index: 0; }
        .dark-theme h1 { color: #00FFFF; text-shadow: 0 0 10px #00FFFF; font-size: 3em; font-weight: 900; }

        /* WIDGETY */
        .christmas-lights { position: fixed; top: 0; width: 100%; height: 20px; display: flex; justify-content: space-around; z-index: 100; }
        .light-bulb { width: 12px; height: 12px; border-radius: 50%; animation: pulse-light 1.5s infinite alternate; }
        @keyframes pulse-light { from { opacity: 0.5; } to { opacity: 1; } }
        .red { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .blue { background: #0000ff; box-shadow: 0 0 10px #0000ff; }
        .green { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        
        #snowfall-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .snowflake { position: absolute; background: white; border-radius: 50%; animation: snowfall linear infinite; }
        @keyframes snowfall { 0% { transform: translateY(-10vh); } 100% { transform: translateY(110vh); } }

        #back-to-top { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; background: rgba(160, 68, 255, 0.6); color: white; border-radius: 50%; text-align: center; line-height: 50px; text-decoration: none; z-index: 100; opacity: 0; transition: 0.3s; }
        .show-btn { opacity: 1 !important; }

        .neon-button { display: inline-block; padding: 10px 20px; margin: 10px; border: 2px solid #CC33FF; color: white; text-decoration: none; border-radius: 5px; background: rgba(204, 51, 255, 0.2); }
    </style>
</head>
<body>

        <div class="light-bulb red"></div><div class="light-bulb blue"></div><div class="light-bulb green"></div>
        <div class="light-bulb red"></div><div class="light-bulb blue"></div><div class="light-bulb green"></div>
        <div class="light-bulb red"></div><div class="light-bulb blue"></div><div class="light-bulb green"></div>
    </div>

    <div id="snowfall-container"></div> 

    <header>
        <h1 id="top">TO JEST LEPSZE DUO</h1>
        <p>ZAPISANI NA KARTACH HISTORII OD 31.08.2025</p>
        <div id="duo-counter"><p id="love-clock" style="font-weight: bold; font-size: 1.1em;"></p></div>
        <p id="neon-clock"></p>
        <p id="visit-counter"></p>
        
        <div class="theme-toggle-container">
            <button id="toggle-glass" class="theme-toggle-button" onclick="setTheme('glass')">🧊 GLASSMORPHISM</button>
            <button id="toggle-neon" class="theme-toggle-button" onclick="setTheme('neon')">🔮 NEONOWY</button>
            <button id="toggle-dark" class="theme-toggle-button" onclick="setTheme('dark')">⚫ CZERŃ/FUTURYZM</button>
        </div>
        <input type="range" id="volume-slider" min="0" max="100" value="5" oninput="setVolume(this.value)" onclick="playMusic()">

    <audio id="background-audio" loop><source src="nasza_piosenka.mp3" type="audio/mpeg"></audio>

    <script>
        // ==========================================
        // 1. KONFIGURACJA FIREBASE (Wklej tu swoje dane)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAJr96Nb1ypYBY7fpqqkjHcuZjW7b6l74c",
            authDomain: "naszeduo-1efce.firebaseapp.com",
            projectId: "naszeduo-1efce",
            storageBucket: "naszeduo-1efce.firebasestorage.app",
            messagingSenderId: "504984499636",
            appId: "1:504984499636:web:37ae30aba2fccaddfeaee1"
        };

firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. OBSŁUGA NOTATEK Z KOLORAMI I DATĄ
        function addNote() {
            const input = document.getElementById('note-text');
            if (input.value.trim() === "") return;

            // Pytamy o imię tylko raz - potem przeglądarka pamięta
            let author = localStorage.getItem('my_name');
            if (!author) {
                author = prompt("Jak masz na imię? (To ustali Twój kolor notatek)");
                if (!author) return;
                localStorage.setItem('my_name', author);
            }

            db.collection("notatki").add({
                text: input.value,
                author: author,
                time: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => { 
                input.value = ""; 
            });
        }

        // Wyświetlanie notatek
        db.collection("notatki").orderBy("time", "desc").onSnapshot((snap) => {
            const list = document.getElementById('notes-list');
            list.innerHTML = "";
            
            snap.forEach((doc) => {
                const note = doc.data();
                const date = note.time ? note.time.toDate().toLocaleString('pl-PL', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                }) : "Wysyłanie...";

                // Ustalamy kolor na podstawie autora
                // Jeśli autorem jest osoba o imieniu zapisanym w Twoim telefonie, dajemy fioletowy, w innym wypadku błękitny
                const myName = localStorage.getItem('my_name');
                const borderColor = (note.author === myName) ? "#A044FF" : "#00FFFF";

                list.innerHTML += `
                    <div class="note-card" style="border-left: 5px solid ${borderColor}; margin-bottom: 15px;">
                        <button class="delete-note" onclick="deleteNote('${doc.id}')" style="font-size: 1.2em;">×</button>
                        <strong style="font-size: 0.8em; color: ${borderColor};">${note.author.toUpperCase()}</strong>
                        <p style="margin: 5px 0;">${note.text}</p>
                        <small style="display: block; font-size: 0.7em; opacity: 0.6; text-align: right;">${date}</small>
                    </div>`;
            });
        });

        function deleteNote(id) { 
            if(confirm("Usunąć tę notatkę?")) {
                db.collection("notatki").doc(id).delete(); 
            }
        }

        // === RESZTA TWOICH FUNKCJI (ZEGAR, MOTYWY ITP.) ===
        function updateDuoCounter() {
            const start = new Date('2025-08-31T00:00:00');
            const now = new Date();
            const diff = now - start;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('love-clock').innerHTML = `RAZEM JUŻ: ${d} dni, ${h}h ${m}m ${s}s ❤️`;
        }
        setInterval(updateDuoCounter, 1000);

        function setTheme(t) {
            document.body.classList.remove('neon-theme', 'dark-theme');
            if(t !== 'glass') document.body.classList.add(t + '-theme');
            localStorage.setItem('theme', t);
        }

        var isPlaying = false;
        function playMusic() { if(!isPlaying) { document.getElementById('background-audio').play(); isPlaying = true; } }
        function setVolume(v) { document.getElementById('background-audio').volume = v/100; }

        function snow() {
            const container = document.getElementById('snowfall-container');
            for(let i=0; i<40; i++) {
                const s = document.createElement('div');
                s.className = 'snowflake';
                s.style.width = s.style.height = (Math.random()*3+2)+'px';
                s.style.left = Math.random()*100+'vw';
                s.style.animationDuration = (Math.random()*15+10)+'s';
                s.style.animationDelay = `-${Math.random()*10}s`;
                container.appendChild(s);
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('theme') || 'glass';
            setTheme(saved);
            updateDuoCounter();
            snow();
            let visits = parseInt(localStorage.getItem('vCount') || 0) + 1;
            localStorage.setItem('vCount', visits);
            document.getElementById('visit-counter').innerHTML = `🌟 WSPOMNIENIE NR: ${visits}`;
        };
    </script>
</body>
